name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Crear .env para Prisma
        run: echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/taskmanager" > .env
        working-directory: ./backend
      - run: npx prisma generate
        working-directory: ./backend
      - run: npm run lint
      - run: npm run build

  pruebas:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --coverage

  e2e:
    name: Pruebas E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager
      PORT: 3000
      VITE_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias del frontend
        run: npm ci

      - name: Instalar dependencias del backend
        run: npm ci
        working-directory: ./backend

      - name: Crear .env para Prisma
        run: echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/taskmanager" > .env
        working-directory: ./backend

      - name: Aplicar migraciones de Prisma
        run: npx prisma migrate deploy
        working-directory: ./backend

      - name: Levantar el backend en segundo plano
        run: nohup npm run dev > backend.log 2>&1 &
        working-directory: ./backend

      - name: Esperar a que el backend responda
        run: npx wait-on tcp:3000

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps chromium

      - name: Correr las pruebas E2E
        run: npx playwright test