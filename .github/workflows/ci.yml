name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirmacion:
        description: 'Escribe DEPLOY para confirmar el despliegue a produccion'
        required: true

jobs:
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend - Lint, Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Crear .env para Prisma
        run: echo "DATABASE_URL=$DATABASE_URL" > .env
        working-directory: ./backend
      - run: npx prisma generate
        working-directory: ./backend
      - run: npm run lint
      - run: npm run build
      - name: Aplicar migraciones de Prisma
        run: npx prisma migrate deploy
        working-directory: ./backend
      - name: Ejecutar tests del backend (Supertest)
        run: npm test
        working-directory: ./backend

  pruebas:
    name: Pruebas unitarias y cobertura
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run --coverage

  e2e:
    name: Pruebas E2E
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: taskmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskmanager
      PORT: 3000
      VITE_API_URL: http://localhost:3000
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias del frontend
        run: npm ci

      - name: Instalar dependencias del backend
        run: npm ci
        working-directory: ./backend

      - name: Crear .env para Prisma
        run: echo "DATABASE_URL=$DATABASE_URL" > .env
        working-directory: ./backend

      - name: Generar cliente de Prisma
        run: npx prisma generate
        working-directory: ./backend

      - name: Aplicar migraciones de Prisma
        run: npx prisma migrate deploy
        working-directory: ./backend

      - name: Ejecutar seed
        run: npx prisma db seed
        working-directory: ./backend

      - name: Levantar el backend en segundo plano
        run: nohup npm run dev > backend.log 2>&1 &
        working-directory: ./backend

      - name: Esperar a que el backend responda
        run: npx wait-on tcp:3000

      - name: Instalar navegadores de Playwright
        run: npx playwright install --with-deps chromium

      - name: Correr las pruebas E2E
        run: npx playwright test

      - name: Mostrar log del backend si falló
        if: failure()
        run: cat backend.log
        working-directory: ./backend

  deploy-staging:
    name: Deploy a Staging
    needs: [frontend, backend, pruebas, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Railway CLI
        run: npm install -g @railway/cli
      - name: Desplegar a Railway (staging)
        run: railway up --service backend --environment staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-produccion:
    name: Deploy a Producción (manual)
    needs: [frontend, backend, pruebas, e2e, migraciones-produccion]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirmacion == 'DEPLOY'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @railway/cli
      - name: Desplegar a Railway (produccion)
        run: railway up --service backend --environment production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}