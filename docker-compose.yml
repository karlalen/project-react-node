services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: taskmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:123456@postgres:5432/taskmanager
      PORT: 3000
      SECRET_KEY: ${SECRET_KEY:-mi_clave_secreta}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:

# Notas de adaptación a tu proyecto (task-manager-react):
#
# 1. frontend.build.context es "." (raíz), no "./frontend", porque tu
#    frontend vive en la raíz del repo, no en una subcarpeta.
# 2. Usé las credenciales de tu Postgres local (postgres/123456/taskmanager)
#    para que no tengas que reconciliar dos configuraciones distintas.
# 3. PORT=3000 para el backend, igual que en tu job "e2e" de CI
#    (así VITE_API_URL=http://localhost:3000 funciona igual en ambos lados).
# 4. SECRET_KEY: esto SOLO funciona si cambias tu código para leer
#    process.env.SECRET_KEY en vez del string hardcodeado "mi_clave_secreta"
#    en app.ts. El docker-compose no puede inyectar nada si el código
#    ignora la variable de entorno.